<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>iOS Style Website</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:-apple-system,BlinkMacSystemFont,sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    linear-gradient(135deg,#00c6ff,#0072ff,#7f5af0);
    overflow:hidden;
}

body::before{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.2);
    border-radius:50%;
    top:-100px;
    left:-100px;
    filter:blur(80px);
}

body::after{
    content:"";
    position:absolute;
    width:400px;
    height:400px;
    background:rgba(255,255,255,.15);
    border-radius:50%;
    bottom:-100px;
    right:-100px;
    filter:blur(80px);
}

.card{
    width:90%;
    max-width:420px;
    padding:30px;
    border-radius:30px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(25px);
    -webkit-backdrop-filter:blur(25px);
    border:1px solid rgba(255,255,255,.2);
    box-shadow:0 8px 32px rgba(0,0,0,.2);
    color:white;
    text-align:center;
}

.avatar{
    width:100px;
    height:100px;
    margin:auto;
    border-radius:50%;
    background:rgba(255,255,255,.2);
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:40px;
}

h1{
    margin-top:15px;
}

p{
    margin-top:10px;
    opacity:.9;
}

.btn{
    margin-top:20px;
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:rgba(255,255,255,.2);
    color:white;
    font-size:16px;
    cursor:pointer;
    transition:.3s;
}

.btn:hover{
    background:rgba(255,255,255,.3);
    transform:scale(1.03);
}
</style>
</head>
<body>

<div class="card">
    <div class="avatar">🍎</div>

    <h1>Salom!</h1>

    <p>
        GitHub Pages uchun tayyor iOS uslubidagi
        shaffof sayt.
    </p>

    <button class="btn" onclick="showMessage()">
        Bosing
    </button>
</div>

<script>
function showMessage(){
    alert("iOS uslubidagi sayt ishlayapti 🚀");
}
</script>

</body>
</html>
