#111827,

body::before{

height:350px;

body::after{

height:350px;

right:-100px;

.card{

box-shadow:0 20px 50px rgba(0,0,0,.4);

color:white;
}

.avatar{
width:100px;
height:100px;
margin:auto;
border-radius:50%;
background:rgba(255,255,255,.1);

font-size:42px;
}

margin-top:15px;
font-size:28px;
}

.desc{
margin-top:10px;
color:#d1d5db;
line-height:1.5;
font-size:15px;
}

.link{
display:block;
text-decoration:none;
color:white;
margin-top:15px;
padding:15px;
border-radius:18px;
background:rgba(255,255,255,.08);
transition:.3s;
}

.link:hover{
transform:translateY(-3px);
background:rgba(255,255,255,.14);
}

.footer{
margin-top:20px;
font-size:12px;
color:#9ca3af;
}
